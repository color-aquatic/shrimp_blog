<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 16" width="24" height="16">
  <rect width="24" height="16" fill="#012169"/>
  <!-- White diagonal crosses -->
  <path d="M0,0 L24,16 M24,0 L0,16" stroke="white" stroke-width="2"/>
  <!-- Red diagonal crosses -->
  <path d="M0,0 L24,16 M24,0 L0,16" stroke="#C8102E" stroke-width="1"/>
  <!-- White vertical and horizontal -->
  <rect x="10" y="0" width="4" height="16" fill="white"/>
  <rect x="0" y="6" width="24" height="4" fill="white"/>
  <!-- Red vertical and horizontal -->
  <rect x="11" y="0" width="2" height="16" fill="#C8102E"/>
  <rect x="0" y="7" width="24" height="2" fill="#C8102E"/>
</svg>